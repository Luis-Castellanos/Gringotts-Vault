<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vault — Credit Cards</title>
<style>
  /* ─── Tokens (shared with the rest of Vault) ──────────── */
  :root, [data-theme="light"] {
    --bg: #faf7f2; --surface: #fffdf9; --surface-hover: #f5f0e8; --surface-elev: #f0ebe2;
    --text-1: #1a1815; --text-2: #6b6358; --text-3: #8b8278;
    --line: rgba(0,0,0,.06); --line-strong: rgba(0,0,0,.12);
    --green: #16a34a; --green-tint: #d4f5e0; --green-text: #15803d;
    --blue:  #2563eb; --blue-tint:  #dbeafe; --blue-text:  #1d4ed8;
    --red:   #dc2626; --red-tint:   #fee2e2; --red-text:   #b91c1c;
    --purple:#7c3aed; --purple-tint:#ede9fe; --purple-text:#6d28d9;
    --amber: #b45309; --amber-tint: #fef3c7; --amber-text: #92400e;
    --shadow-card: 0 1px 4px rgba(0,0,0,.025), 0 0 0 0.5px var(--line);
    --ease-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  [data-theme="dark"] {
    --bg: #0f0e0c; --surface: #1a1815; --surface-hover: #211e1a; --surface-elev: #14130f;
    --text-1: #faf7f2; --text-2: #a1998d; --text-3: #6b6358;
    --line: rgba(255,255,255,.06); --line-strong: rgba(255,255,255,.12);
    --green: #4ade80; --green-tint: rgba(34,197,94,.15); --green-text: #4ade80;
    --blue:  #60a5fa; --blue-tint:  rgba(59,130,246,.15); --blue-text: #60a5fa;
    --red:   #f87171; --red-tint:   rgba(239,68,68,.15); --red-text:  #f87171;
    --purple:#a78bfa; --purple-tint:rgba(139,92,246,.15);--purple-text:#a78bfa;
    --amber: #fbbf24; --amber-tint: rgba(245,158,11,.15);--amber-text:#fbbf24;
    --shadow-card: 0 1px 4px rgba(0,0,0,.25), 0 0 0 0.5px var(--line);
  }

  [data-density="compact"] { --card-pad: 14px; --row-pad: 8px;  --gap: 10px; --line-fz: 13px; }
  [data-density="regular"] { --card-pad: 18px; --row-pad: 11px; --gap: 12px; --line-fz: 15px; }
  [data-density="comfy"]   { --card-pad: 24px; --row-pad: 14px; --gap: 16px; --line-fz: 16px; }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text-1);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
    font-size: 15px; line-height: 1.45;
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    transition: background 200ms ease, color 200ms ease;
  }
  .num { font-variant-numeric: tabular-nums; }
  .num-display {
    font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-variant-numeric: tabular-nums;
  }

  /* ─── Page chrome ─────────────────────────────────── */
  .page { max-width: 1100px; margin: 0 auto; padding: 28px 32px 80px; }
  .page-hd { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  .crumbs { display: flex; align-items: center; gap: 6px; color: var(--text-3); font-size: 12px; }
  .crumbs .here { color: var(--text-1); font-weight: 500; }
  .page-title { font-size: 24px; font-weight: 700; letter-spacing: -.02em; margin: 4px 0 0; }
  .page-actions { display: flex; gap: 8px; align-items: center; }
  .pg-btn {
    appearance: none; background: transparent; border: 1px solid var(--line-strong);
    color: var(--text-2); padding: 7px 12px; border-radius: 8px;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 150ms ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .pg-btn:hover { color: var(--text-1); background: var(--surface-hover); border-color: var(--text-3); }
  .pg-btn.primary { background: var(--text-1); color: var(--bg); border-color: var(--text-1); }
  .pg-btn.primary:hover { background: var(--text-2); border-color: var(--text-2); }

  /* Tabs */
  .tabs { display: flex; gap: 26px; border-bottom: 1px solid var(--line); margin-bottom: 20px; }
  .tab {
    appearance: none; border: 0; background: transparent;
    padding: 11px 0; margin-bottom: -1px;
    color: var(--text-2); font-weight: 500; font-size: 15px;
    border-bottom: 2px solid transparent;
    cursor: pointer; transition: color 150ms ease, border-color 150ms ease;
    letter-spacing: -.005em;
  }
  .tab:hover { color: var(--text-1); }
  .tab.active { color: var(--text-1); font-weight: 600; border-bottom-color: var(--text-1); }
  .tab .count { font-weight: 500; color: var(--text-3); margin-left: 6px; font-size: 12px; }

  /* ─── Card primitives ─────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: 16px;
    padding: var(--card-pad);
    box-shadow: var(--shadow-card);
  }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); }
  .pill {
    display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px;
    border-radius: 999px; font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    line-height: 1.4;
  }
  .pill.green  { background: var(--green-tint);  color: var(--green-text); }
  .pill.amber  { background: var(--amber-tint);  color: var(--amber-text); }
  .pill.red    { background: var(--red-tint);    color: var(--red-text); }
  .pill.purple { background: var(--purple-tint); color: var(--purple-text); }
  .pill.blue   { background: var(--blue-tint);   color: var(--blue-text); }

  /* ─── Metric tiles row ─────────────────────────────── */
  .cc-tiles {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: var(--gap);
  }
  .cc-tile {
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .cc-tile .lbl { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); }
  .cc-tile .val {
    font-size: 24px; font-weight: 700; letter-spacing: -.02em; color: var(--text-1);
    line-height: 1.05; font-variant-numeric: tabular-nums; margin-top: 2px;
  }
  .cc-tile .sub {
    font-size: 12.5px; color: var(--text-2);
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
  }
  .cc-tile .sub .pos { color: var(--green-text); font-weight: 600; }
  .cc-tile .sub .neg { color: var(--red-text); font-weight: 600; }

  /* ─── Master utilization bar ───────────────────────── */
  .master-util {
    padding: 16px 20px;
    margin-bottom: var(--gap);
  }
  .master-util-hd {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 12px;
  }
  .master-util-hd .ttl { font-size: 13px; font-weight: 600; color: var(--text-1); }
  .master-util-hd .util-pct {
    font-size: 20px; font-weight: 700; letter-spacing: -.015em;
    font-variant-numeric: tabular-nums; color: var(--text-1);
  }
  .master-util-hd .util-pct .of {
    color: var(--text-3); font-weight: 500; font-size: 12.5px;
    margin-left: 8px; letter-spacing: 0;
  }
  .util-bar {
    position: relative; height: 12px;
    background: var(--surface-elev); border-radius: 6px; overflow: visible;
  }
  .util-bar .fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    border-radius: 6px;
    transition: width 300ms var(--ease-back), background 200ms ease;
  }
  .util-bar .fill.green { background: linear-gradient(90deg, var(--green) 0%, #15803d 100%); }
  .util-bar .fill.amber { background: linear-gradient(90deg, var(--amber) 0%, #92400e 100%); }
  .util-bar .fill.red   { background: linear-gradient(90deg, var(--red) 0%, #991b1b 100%); }
  .util-bar .marker {
    position: absolute; top: -3px; bottom: -3px;
    width: 1.5px; background: var(--text-3); opacity: .5;
  }
  .util-markers {
    display: flex; justify-content: space-between;
    margin-top: 8px;
    font-size: 10.5px; color: var(--text-3); font-variant-numeric: tabular-nums;
  }
  .util-markers .threshold {
    display: flex; align-items: baseline; gap: 4px;
  }
  .util-markers .threshold .v { font-weight: 600; }
  .marker-label {
    position: absolute; top: 14px; transform: translateX(-50%);
    font-size: 10px; color: var(--text-3); font-weight: 600;
    letter-spacing: .04em; text-transform: uppercase;
    white-space: nowrap;
  }

  /* ─── Card row ─────────────────────────────────────── */
  .cc-list { display: flex; flex-direction: column; gap: 8px; }

  /* Wrapper holds the row + expandable details. Visual chrome (bg, radius,
     shadow) lives on the wrapper so the two children read as a single card. */
  .cc-row-wrap {
    background: var(--surface);
    border-radius: 14px;
    box-shadow: var(--shadow-card);
    transition: box-shadow 220ms ease, transform 200ms ease, opacity 220ms ease;
    overflow: hidden;
  }
  .cc-list:hover .cc-row-wrap:not(:hover):not(.open) { opacity: .55; }
  .cc-row-wrap:hover:not(.open) {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(0,0,0,.06), 0 0 0 0.5px var(--line);
  }
  .cc-row-wrap.open {
    box-shadow: 0 10px 32px rgba(0,0,0,.10), 0 0 0 0.5px var(--line);
    opacity: 1;
  }

  .cc-row {
    display: grid;
    /* grip · art · name (snug) · util (grows to fill) · balance · chev */
    grid-template-columns: 16px 132px minmax(180px, 260px) 1fr 112px 22px;
    align-items: center; gap: 14px;
    padding: 12px 14px;
    cursor: pointer;
    position: relative;
  }
  .cc-row .cc-chev svg { transition: transform 320ms cubic-bezier(0.32, 0.72, 0.24, 1); }
  .cc-row-wrap.open .cc-row .cc-chev svg { transform: rotate(90deg); color: var(--text-1); }

  /* Drag handle — visible on row hover so empty state isn't cluttered */
  .cc-grip {
    color: var(--text-3);
    opacity: 0;
    transition: opacity 150ms ease, color 150ms ease;
    cursor: grab;
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 28px;
    user-select: none;
  }
  .cc-row:hover .cc-grip,
  .cc-row-wrap.open .cc-grip,
  .cc-row-wrap.dragging .cc-grip { opacity: 1; }
  .cc-grip:hover { color: var(--text-1); }
  .cc-grip:active { cursor: grabbing; }

  /* Drag state — ghost the source row, draw a drop indicator on the target */
  .cc-row-wrap.dragging {
    opacity: .35;
    box-shadow: 0 0 0 0.5px var(--line);
  }
  .cc-row-wrap.drop-before::before,
  .cc-row-wrap.drop-after::after {
    content: ""; position: absolute; left: 8px; right: 8px;
    height: 2.5px; border-radius: 2px;
    background: var(--blue);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue) 22%, transparent);
    pointer-events: none;
    z-index: 4;
  }
  .cc-row-wrap.drop-before::before { top: -5px; }
  .cc-row-wrap.drop-after::after   { bottom: -5px; }
  .cc-row-wrap { position: relative; }

  /* Inline expansion below the row — animates from 0fr → 1fr (auto height).
     Separate open vs close timing: opening lets the container expand first,
     then content fades in. Closing fades content out first, then collapses. */
  .cc-expand {
    display: grid;
    grid-template-rows: 0fr;
    /* closing transition (when .open is removed): container collapses with a
       small delay so the content has time to fade out first */
    transition: grid-template-rows 340ms cubic-bezier(0.4, 0, 0.2, 1) 80ms;
  }
  .cc-row-wrap.open .cc-expand {
    grid-template-rows: 1fr;
    /* opening: container expands first, no delay */
    transition: grid-template-rows 380ms cubic-bezier(0.32, 0.72, 0.24, 1);
  }
  .cc-expand-inner { min-height: 0; overflow: hidden; }
  .cc-expand-content {
    padding: 4px 18px 20px;
    border-top: 1px solid var(--line);
    margin-top: 4px;
    opacity: 0;
    transform: translateY(-6px);
    /* closing: content fades out fast, no delay */
    transition: opacity 200ms cubic-bezier(0.4, 0, 0.2, 1),
                transform 280ms cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; flex-direction: column; gap: 14px;
  }
  .cc-row-wrap.open .cc-expand-content {
    opacity: 1; transform: translateY(0);
    /* opening: wait for container to start expanding before content appears */
    transition: opacity 300ms cubic-bezier(0.4, 0, 0.2, 1) 120ms,
                transform 380ms cubic-bezier(0.32, 0.72, 0.24, 1) 100ms;
  }

  /* Inline detail layouts — wider than the old side-drawer */
  .cc-inline-stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
  }
  .cc-inline-bottom {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 14px;
  }
  .cc-inline-bottom .drawer-section { padding: 0; }
  .cc-inline-bottom .drawer-grid { grid-template-columns: 1fr 1fr; }
  .cc-expand-content .drawer-section .h { padding: 4px 2px 10px; }

  /* Card art */
  .cc-art {
    width: 132px; height: 84px; border-radius: 10px;
    background: linear-gradient(135deg, var(--art-from) 0%, var(--art-to) 100%);
    padding: 10px 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    color: white; position: relative; overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.18);
  }
  /* Subtle sheen — keeps art visually interesting without crowding content.
     One element handles both the top-right highlight and a faint diagonal band. */
  .cc-art::after {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 95% -5%, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 55%),
      linear-gradient(118deg, transparent 50%, rgba(255,255,255,.05) 58%, transparent 66%);
    pointer-events: none;
  }
  .cc-art .issuer {
    font-size: 10.5px; font-weight: 700; letter-spacing: .12em;
    text-transform: uppercase; opacity: .9;
    z-index: 1;
    /* Don't wrap onto two lines; truncate gracefully if issuer name is long */
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
  }
  .cc-art .cc-art-last4 {
    position: absolute;
    left: 12px; bottom: 11px;
    font-size: 11px; font-weight: 600;
    letter-spacing: .18em;
    font-variant-numeric: tabular-nums;
    color: white; opacity: .92;
    line-height: 1;
    z-index: 1;
  }
  .cc-art .network {
    font-size: 9.5px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; opacity: .75; align-self: flex-end;
    z-index: 1;
  }

  /* Card row: name col */
  .cc-name-col {
    display: flex; flex-direction: column; gap: 3px; min-width: 0;
  }
  .cc-name-col .top {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .cc-name-col .n { font-size: 16px; font-weight: 600; color: var(--text-1); letter-spacing: -.01em; }
  .cc-name-col .n.editable { cursor: text; }
  .cc-name-col .n.editable:hover {
    text-decoration: underline dotted var(--text-3);
    text-underline-offset: 3px;
  }
  .cc-rename-btn {
    appearance: none; border: 0; background: transparent;
    color: var(--text-3);
    width: 22px; height: 22px;
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 150ms ease, color 150ms ease, background 150ms ease;
    flex-shrink: 0;
  }
  .cc-row:hover .cc-rename-btn { opacity: .65; }
  .cc-rename-btn:hover { opacity: 1; color: var(--text-1); background: var(--surface-hover); }
  .cc-rename-btn:focus-visible {
    opacity: 1; outline: 2px solid var(--blue); outline-offset: 1px;
  }
  .cc-name-edit {
    appearance: none;
    background: var(--surface);
    border: 1px solid var(--text-2);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 16px; font-weight: 600; color: var(--text-1);
    font-family: inherit;
    letter-spacing: -.01em;
    outline: none;
    min-width: 0;
    width: 220px;
    max-width: 100%;
  }
  .cc-name-edit:focus { border-color: var(--text-1); box-shadow: 0 0 0 3px color-mix(in srgb, var(--text-1) 12%, transparent); }
  .cc-name-col .sub {
    font-size: 12.5px; color: var(--text-3);
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .cc-name-col .sub .b { color: var(--text-2); font-weight: 500; }
  .cc-name-col .sub .last4 { font-variant-numeric: tabular-nums; }
  .cc-name-col .sub .dot { color: var(--text-3); opacity: .5; }

  /* Card row: utilization mini-bar */
  .cc-util {
    display: flex; flex-direction: column; gap: 5px;
    min-width: 0;
    margin-right: 8px;
  }
  .cc-util .bar {
    position: relative; height: 11px; background: var(--surface-elev);
    border-radius: 6px; overflow: hidden;
  }
  .cc-util .bar .fill {
    position: absolute; left: 0; top: 0; bottom: 0; border-radius: 6px;
    transition: width 300ms var(--ease-back);
  }
  .cc-util .bar .fill.green { background: var(--green); }
  .cc-util .bar .fill.amber { background: var(--amber); }
  .cc-util .bar .fill.red   { background: var(--red); }
  .cc-util .meta {
    display: flex; justify-content: space-between; align-items: baseline;
    font-size: 11.5px; color: var(--text-3); font-variant-numeric: tabular-nums;
  }
  .cc-util .meta .pct {
    font-weight: 600; color: var(--text-1); font-size: 12.5px;
  }
  .cc-util .meta .pct.green { color: var(--green-text); }
  .cc-util .meta .pct.amber { color: var(--amber-text); }
  .cc-util .meta .pct.red   { color: var(--red-text); }

  /* Card row: balance col */
  .cc-bal {
    text-align: right; display: flex; flex-direction: column; gap: 3px;
  }
  .cc-bal .b {
    font-size: 18px; font-weight: 700; letter-spacing: -.015em;
    color: var(--text-1); font-variant-numeric: tabular-nums;
  }
  .cc-bal .b.red { color: var(--red-text); }
  .cc-bal .of {
    font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums;
  }

  .cc-chev {
    color: var(--text-3); display: inline-flex; align-items: center; justify-content: center;
  }

  /* State chip on card row */
  .cc-state-chip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    line-height: 1.4;
  }
  .cc-state-chip.signup { background: var(--green-tint); color: var(--green-text); }
  .cc-state-chip.fee    { background: var(--amber-tint); color: var(--amber-text); }

  /* ─── Slide-in drawer ─────────────────────────────── */
  .drawer-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.32);
    opacity: 0;
    pointer-events: none;
    transition: opacity 240ms ease;
    z-index: 100;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: min(540px, 100vw);
    background: var(--surface);
    border-left: 1px solid var(--line);
    box-shadow: -12px 0 40px rgba(0,0,0,.12);
    transform: translateX(100%);
    transition: transform 320ms var(--ease-back);
    z-index: 101;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-hd {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 22px;
    border-bottom: 1px solid var(--line);
  }
  .drawer-hd .ttl { font-size: 13px; font-weight: 600; color: var(--text-2); letter-spacing: -.005em; }
  .drawer-close {
    appearance: none; background: transparent; border: 0;
    width: 28px; height: 28px; border-radius: 7px; color: var(--text-2);
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  }
  .drawer-close:hover { background: var(--surface-hover); color: var(--text-1); }
  .drawer-body {
    flex: 1; overflow-y: auto;
    padding: 22px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .drawer-hero {
    display: grid; grid-template-columns: 180px 1fr; gap: 18px;
    align-items: center;
  }
  .drawer-hero .cc-art { width: 180px; height: 114px; }
  .drawer-hero .info { display: flex; flex-direction: column; gap: 4px; }
  .drawer-hero .info .n { font-size: 20px; font-weight: 700; letter-spacing: -.02em; color: var(--text-1); }
  .drawer-hero .info .sub { font-size: 13px; color: var(--text-3); }
  .drawer-hero .info .sub b { color: var(--text-2); font-weight: 500; }

  .drawer-state-card {
    padding: 16px 18px;
    border-radius: 12px;
    background: var(--surface-elev);
    box-shadow: inset 0 0 0 0.5px var(--line);
  }
  .drawer-state-card.signup { background: color-mix(in srgb, var(--green-tint) 70%, var(--surface)); }
  .drawer-state-card.fee    { background: color-mix(in srgb, var(--amber-tint) 70%, var(--surface)); }

  .drawer-state-card .state-hd {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 12px;
  }
  .drawer-state-card .state-hd .l {

  /* Privacy mode: blur amounts */
  [data-privacy="on"] .num,

  [data-privacy="on"] .cc-tile .val,
  [data-privacy="on"] .cc-bal .b,

  [data-privacy="on"] .drawer-stat .val,
  [data-privacy="on"] .progress-row .nums .a,
  [data-privacy="on"] .state-line-row .v {

  [data-privacy="on"] .num:hover,
  [data-privacy="on"] .cc-tile:hover .val,
  [data-privacy="on"] .cc-row:hover .cc-bal .b,

  .cc-sort {

    background-repeat: no-repeat;
