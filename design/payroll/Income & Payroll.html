<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vault — Income & Payroll</title>
<style>
  /* ─── Tokens ─────────────────────────────────────────── */
  :root, [data-theme="light"] {
    --bg: #faf7f2;
    --surface: #fffdf9;
    --surface-hover: #f5f0e8;
    --surface-elev: #f0ebe2;
    --text-1: #1a1815;
    --text-2: #6b6358;
    --text-3: #8b8278;
    --line: rgba(0,0,0,.06);
    --line-strong: rgba(0,0,0,.12);

    --green: #16a34a; --green-tint: #d4f5e0; --green-text: #15803d;
    --blue:  #2563eb; --blue-tint:  #dbeafe; --blue-text:  #1d4ed8;
    --red:   #dc2626; --red-tint:   #fee2e2; --red-text:   #b91c1c;
    --purple:#7c3aed; --purple-tint:#ede9fe; --purple-text:#6d28d9;
    --amber: #b45309; --amber-tint: #fef3c7; --amber-text: #92400e;

    --shadow-card: 0 1px 4px rgba(0,0,0,.025), 0 0 0 0.5px var(--line);
    --ease-back: cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  [data-theme="dark"] {
    --bg: #0f0e0c;
    --surface: #1a1815;
    --surface-hover: #211e1a;
    --surface-elev: #14130f;
    --text-1: #faf7f2;
    --text-2: #a1998d;
    --text-3: #6b6358;
    --line: rgba(255,255,255,.06);
    --line-strong: rgba(255,255,255,.12);

    --green: #4ade80; --green-tint: rgba(34,197,94,.15); --green-text: #4ade80;
    --blue:  #60a5fa; --blue-tint:  rgba(59,130,246,.15); --blue-text: #60a5fa;
    --red:   #f87171; --red-tint:   rgba(239,68,68,.15); --red-text:  #f87171;
    --purple:#a78bfa; --purple-tint:rgba(139,92,246,.15);--purple-text:#a78bfa;
    --amber: #fbbf24; --amber-tint: rgba(245,158,11,.15);--amber-text:#fbbf24;

    --shadow-card: 0 1px 4px rgba(0,0,0,.25), 0 0 0 0.5px var(--line);
  }

  /* density (Apple Wallet-ish defaults) */
  [data-density="compact"] { --card-pad: 14px; --row-pad: 8px;  --gap: 10px; --line-fz: 13px; }
  [data-density="regular"] { --card-pad: 18px; --row-pad: 11px; --gap: 12px; --line-fz: 15px; }
  [data-density="comfy"]   { --card-pad: 24px; --row-pad: 14px; --gap: 16px; --line-fz: 16px; }

  /* ─── Base ──────────────────────────────────────────── */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    transition: background 200ms ease, color 200ms ease;
  }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .num-display {
    font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-variant-numeric: tabular-nums;
  }

  /* ─── Layout ───────────────────────────────────────── */
  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 24px 28px 56px;
  }

  /* ─── Page chrome ──────────────────────────────────── */
  .page-hd {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 16px;
  }
  .crumbs {
    display: flex; align-items: center; gap: 6px;
    color: var(--text-3); font-size: 12px; letter-spacing: .01em;
  }
  .crumbs .sep { opacity: .5; }
  .crumbs .here { color: var(--text-1); font-weight: 500; }
  .page-title {
    font-size: 24px; font-weight: 700; letter-spacing: -.02em;
    margin: 4px 0 0;
  }
  .mode-toggle {
    appearance: none; background: transparent; border: 1px solid var(--line-strong);
    color: var(--text-2); padding: 6px 11px; border-radius: 8px;
    font-size: 13px; cursor: pointer; transition: all 150ms ease;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .mode-toggle:hover { color: var(--text-1); background: var(--surface-hover); }

  /* ─── Tabs (underline-only) ────────────────────────── */
  .tabs {
    display: flex; gap: 26px; align-items: stretch;
    border-bottom: 1px solid var(--line);
    margin-bottom: 20px;
  }
  .tab {
    appearance: none; border: 0; background: transparent;
    padding: 11px 0; margin-bottom: -1px;
    color: var(--text-2); font-weight: 500; font-size: 15px;
    border-bottom: 2px solid transparent;
    cursor: pointer; transition: color 150ms ease, border-color 150ms ease;
    letter-spacing: -.005em;
  }
  .tab:hover { color: var(--text-1); }
  .tab.active { color: var(--text-1); font-weight: 600; border-bottom-color: var(--text-1); }
  .tab .count {
    font-weight: 500; color: var(--text-3); margin-left: 6px;
    font-size: 12px;
  }

  /* ─── Stub picker (sub-header) ─────────────────────── */
  .stub-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .stub-bar-l {
    display: flex; flex-direction: column; gap: 1px;
  }
  .stub-date {
    font-size: 18px; font-weight: 600; letter-spacing: -.015em;
  }
  .stub-meta {
    color: var(--text-3); font-size: 12px;
  }
  .stub-meta b { color: var(--text-2); font-weight: 500; }
  .stub-nav {
    display: flex; align-items: center; gap: 3px;
  }
  .stub-nav button {
    appearance: none; background: transparent; border: 1px solid var(--line);
    color: var(--text-2); width: 30px; height: 30px; border-radius: 8px;
    cursor: pointer; transition: all 150ms ease;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .stub-nav button:hover:not(:disabled) { color: var(--text-1); background: var(--surface-hover); border-color: var(--line-strong); }
  .stub-nav button:disabled { opacity: .35; cursor: not-allowed; }
  .stub-nav .of {
    font-size: 12px; color: var(--text-3); margin: 0 10px;
  }
  .stub-nav .of b { color: var(--text-1); font-weight: 600; }

  /* ─── Card ─────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border-radius: 16px;
    padding: var(--card-pad);
    box-shadow: var(--shadow-card);
    transition: background 200ms ease;
  }
  .card.banner-card {
    padding: 0;
    overflow: hidden;
  }
  .card-banner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
    line-height: 1.2;
  }
  .card-banner .ttl { display: flex; align-items: center; gap: 8px; }
  .card-banner .meta {
    font-size: 11px; font-weight: 600; letter-spacing: .06em;
    opacity: .8;
  }
  .card-banner.green  { background: var(--green-tint);  color: var(--green-text); }
  .card-banner.blue   { background: var(--blue-tint);   color: var(--blue-text); }
  .card-banner.red    { background: var(--red-tint);    color: var(--red-text); }
  .card-banner.purple { background: var(--purple-tint); color: var(--purple-text); }
  .card-banner.amber  { background: var(--amber-tint);  color: var(--amber-text); }
  .card-body { padding: var(--card-pad); }

  .stack > * + * { margin-top: var(--gap); }
  .row-pair {
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap);
  }
  @media (max-width: 820px) { .row-pair { grid-template-columns: 1fr; } }

  .eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
    color: var(--text-3);
  }
  .card-hd { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
  .card-title { font-size: 16px; font-weight: 600; letter-spacing: -.015em; }
  .card-sub { color: var(--text-3); font-size: 12px; }

  /* ─── Pills ────────────────────────────────────────── */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px;
    border-radius: 999px;
    font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    line-height: 1.4;
  }
  .pill.green  { background: var(--green-tint);  color: var(--green-text); }
  .pill.blue   { background: var(--blue-tint);   color: var(--blue-text); }
  .pill.red    { background: var(--red-tint);    color: var(--red-text); }
  .pill.purple { background: var(--purple-tint); color: var(--purple-text); }
  .pill.amber  { background: var(--amber-tint);  color: var(--amber-text); }

  /* ─── Hero card ────────────────────────────────────── */
  .hero {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: center;
    padding: 18px 20px;
  }
  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; }
    .donut-wrap { justify-self: center; }
  }
  .hero-l { display: flex; flex-direction: column; gap: 8px; }
  .hero-top {
    display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
  }
  .hero-top .eyebrow { line-height: 1; }
  .hero-top .hero-sub { margin-left: auto; }
  .hero-display {
    font-size: 48px; font-weight: 700; letter-spacing: -.035em;
    line-height: 1; color: var(--text-1);
  }
  .hero-display .cents { font-size: .52em; color: var(--text-2); font-weight: 600; }
  .hero-sub { color: var(--text-3); font-size: 12.5px; }
  .hero-sub b { color: var(--text-2); font-weight: 500; }
  .deposit-list {
    display: flex; flex-direction: column; gap: 0;
    margin-top: 8px;
    background: var(--surface-elev);
    border-radius: 11px;
    padding: 0;
    overflow: hidden;
  }
  .deposit-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 13px;
    font-size: 14px;
  }
  .deposit-row + .deposit-row { border-top: 1px solid var(--line); }
  .deposit-row .bank {
    display: flex; align-items: center; gap: 8px;
    color: var(--text-1); font-weight: 500;
  }
  .deposit-row .last4 { color: var(--text-3); font-weight: 400; font-size: 12px; }
  .deposit-row .amt { color: var(--text-1); font-weight: 600; }
  .bank-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); }

  /* ─── Donut ────────────────────────────────────────── */
  .donut-wrap {
    position: relative;
    width: var(--donut-size, 300px);
    height: var(--donut-size, 300px);
    flex-shrink: 0;
  }
  .donut-svg {
    width: 100%; height: 100%;
    display: block;
    overflow: visible;
  }
  .donut-slice {
    fill: none;
    transition: stroke-width 280ms var(--ease-back), opacity 200ms ease;
    cursor: pointer;
  }
  .donut-svg[data-hovered] .donut-slice:not([data-hot]) { opacity: .22; }
  .donut-svg .donut-slice[data-hot] { stroke-width: 10; }
  .donut-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    pointer-events: none;
    width: 180px; height: 180px;
    margin: auto;
    text-align: center;
  }
  .donut-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-3);
    transition: color 200ms ease;
  }
  .donut-amount {
    font-size: 30px; font-weight: 700; letter-spacing: -.03em;
    color: var(--text-1); line-height: 1.05; margin-top: 6px;
    transition: color 200ms ease;
    font-variant-numeric: tabular-nums;
  }
  .donut-percent {
    font-size: 12.5px; color: var(--text-2); margin-top: 4px;
  }

  /* ─── Tables (line item rows) ──────────────────────── */
  .lines {
    display: flex; flex-direction: column;
  }
  .line-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 12px;
    padding: var(--row-pad) 0;
    border-top: 1px solid var(--line);
    font-size: var(--line-fz);
    align-items: baseline;
    letter-spacing: -.005em;
  }
  .line-row:first-child { border-top: 0; }
  .line-row .lbl { color: var(--text-1); font-weight: 500; }
  .line-row .meta { color: var(--text-3); font-size: 12px; }
  .line-row .amt { color: var(--text-1); font-weight: 600; }
  .line-row.subtotal {
    border-top: 1px solid var(--line-strong);
    padding-top: 12px; margin-top: 4px;
    font-weight: 600;
  }
  .line-row.subtotal .lbl { font-weight: 600; }
  .line-row.subtotal .amt { font-weight: 700; }
  .line-section-hd {
    padding: 8px 0 4px;
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .line-section-hd:not(:first-of-type) {
    border-top: 1px solid var(--line);
    margin-top: 4px;
  }

  /* ─── Imputed footnote card (amber) ────────────────── */
  .footnote {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px; align-items: center;
    padding: 13px 16px;
    border-radius: 13px;
    background: var(--amber-tint);
    color: var(--amber-text);
  }
  .footnote .ico {
    width: 26px; height: 26px; border-radius: 50%;
    background: color-mix(in srgb, var(--amber) 22%, transparent);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--amber); font-weight: 700; font-size: 13px;
    flex-shrink: 0;
  }
  .footnote .ftn-body { display: flex; flex-direction: column; gap: 2px; }
  .footnote .ftn-title { font-size: 14px; font-weight: 600; color: var(--text-1); letter-spacing: -.01em; }
  .footnote .ftn-desc { font-size: 12.5px; color: var(--text-2); }
  .footnote .ftn-amts { display: flex; gap: 16px; }
  .footnote .ftn-amt { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
  .footnote .ftn-amt .k { font-size: 10px; color: var(--text-3); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
  .footnote .ftn-amt .v { font-size: 15px; color: var(--text-1); font-weight: 600; }

  /* ─── Wireframe mode ───────────────────────────────── */
  [data-wireframe="on"] .card {
    box-shadow: 0 0 0 1px var(--line-strong);
    background: transparent;
  }
  [data-wireframe="on"] .card-banner {
    background: transparent !important;
    color: var(--text-2) !important;
    box-shadow: inset 0 -1px 0 var(--line-strong);
  }
  [data-wireframe="on"] .deposit-list,
  [data-wireframe="on"] .deposit-row {
    background: transparent;
  }
  [data-wireframe="on"] .footnote {
    background: transparent;
    box-shadow: 0 0 0 1px var(--line-strong);
    color: var(--text-2);
  }
  [data-wireframe="on"] .footnote .ftn-title,
  [data-wireframe="on"] .footnote .ftn-amt .v { color: var(--text-1); }
  [data-wireframe="on"] .pill {
    background: transparent !important;
    box-shadow: 0 0 0 1px var(--line-strong);
    color: var(--text-2) !important;
  }
  [data-wireframe="on"] .donut-slice { stroke: var(--text-3) !important; }
  [data-wireframe="on"] .donut-svg[data-hovered] .donut-slice[data-hot] { stroke: var(--text-1) !important; }
  [data-wireframe="on"] .hero-display { color: var(--text-2); }

  /* ─── Empty-state placeholder for other tabs ───────── */
  .empty {
    padding: 80px 24px; text-align: center;
    color: var(--text-3); font-size: 13px;
  }
  .empty .schematic {
    width: 280px; height: 120px; margin: 0 auto 18px;
    border: 1px dashed var(--line-strong); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3); font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  }

  /* ─── YTD Summary ──────────────────────────────────── */
  .ytd-year-tabs {
    display: inline-flex; gap: 2px;
    background: var(--surface-elev);
    border-radius: 10px;
    padding: 3px;
  }
  .ytd-year-tab {
    appearance: none; border: 0; background: transparent;
    padding: 6px 14px; border-radius: 7px;
    color: var(--text-2); font-weight: 500; font-size: 13px;
    cursor: pointer; transition: all 150ms ease;
    font-variant-numeric: tabular-nums;
  }
  .ytd-year-tab:hover { color: var(--text-1); }
  .ytd-year-tab.active {
    background: var(--surface); color: var(--text-1); font-weight: 600;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 0.5px var(--line);
  }
  .ytd-year-tab .partial { color: var(--amber-text); font-size: 9.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; margin-left: 6px; }

  .ytd-hero {
    padding: 22px 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 24px;
  }
  .ytd-hero-l { display: flex; flex-direction: column; gap: 8px; }
  .ytd-hero-display {
    font-size: 56px; font-weight: 700; letter-spacing: -.035em;
    line-height: 1; color: var(--text-1);
  }
  .ytd-hero-display .cents { font-size: .48em; color: var(--text-2); font-weight: 600; }
  .ytd-hero-sub {
    display: flex; flex-wrap: wrap; gap: 16px;
    margin-top: 4px;
    font-size: 13px; color: var(--text-3);
  }
  .ytd-hero-sub b { color: var(--text-1); font-weight: 600; font-variant-numeric: tabular-nums; }
  .ytd-hero-r { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .ytd-hero-r .avg { font-size: 22px; font-weight: 700; letter-spacing: -.02em; color: var(--text-1); font-variant-numeric: tabular-nums; }
  .ytd-hero-r .avg-lbl { font-size: 10.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); }

  .ytd-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--gap);
  }
  @media (max-width: 820px) { .ytd-grid { grid-template-columns: repeat(2, 1fr); } }
  .ytd-metric {
    padding: 14px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .ytd-metric .lbl { font-size: 10.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); }
  .ytd-metric .val {
    font-size: 24px; font-weight: 700; letter-spacing: -.02em;
    color: var(--text-1); line-height: 1.05; margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .ytd-metric .pct { font-size: 12px; color: var(--text-2); margin-top: 2px; font-variant-numeric: tabular-nums; }
  .ytd-metric.green .val { color: var(--green-text); }
  .ytd-metric.red   .val { color: var(--red-text); }
  .ytd-metric.blue  .val { color: var(--blue-text); }
  .ytd-metric.purple .val { color: var(--purple-text); }

  /* Monthly bar chart */
  .ytd-chart {
    padding: 0;
  }
  .ytd-chart-hd {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 14px 18px 8px;
    border-bottom: 1px solid var(--line);
  }
  .ytd-chart-hd .ttl { font-size: 14px; font-weight: 600; letter-spacing: -.01em; }
  .ytd-chart-hd .lgnd { display: flex; gap: 14px; font-size: 11px; color: var(--text-3); }
  .ytd-chart-hd .lgnd .sw {
    display: inline-flex; align-items: center; gap: 5px;
  }
  .ytd-chart-hd .lgnd .dot { width: 8px; height: 8px; border-radius: 2px; }
  .ytd-chart-body {
    padding: 18px 18px 12px;
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    gap: 6px;
    align-items: end;
    min-height: 200px;
  }
  .ytd-bar-col {
    display: flex; flex-direction: column; align-items: stretch;
    gap: 4px;
    cursor: pointer;
    transition: opacity 150ms ease;
  }
  .ytd-bar-col.dimmed { opacity: .3; }
  .ytd-bar-stack {
    display: flex; flex-direction: column-reverse;
    gap: 2px;
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface-elev);
    min-height: 6px;
  }
  .ytd-bar-seg {
    width: 100%;
    transition: filter 150ms ease;
  }
  .ytd-bar-seg.net { background: var(--green); }
  .ytd-bar-seg.deduct { background: var(--blue); }
  .ytd-bar-seg.tax { background: var(--red); }
  .ytd-bar-col:hover .ytd-bar-seg { filter: brightness(1.08); }
  .ytd-bar-lbl {
    font-size: 10.5px; color: var(--text-3); text-align: center;
    letter-spacing: .02em;
    font-variant-numeric: tabular-nums;
  }
  .ytd-bar-evt {
    width: 6px; height: 6px; border-radius: 50%;
    margin: 0 auto 2px;
  }
  .ytd-bar-evt.purple { background: var(--purple); }
  .ytd-bar-evt.green  { background: var(--green); }
  .ytd-bar-evt.amber  { background: var(--amber); }
  .ytd-bar-evt.blue   { background: var(--blue); }

  /* Events timeline */
  .ytd-events {
    display: flex; flex-direction: column; gap: 0;
  }
  .ytd-event {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 14px; align-items: center;
    padding: 12px 16px;
