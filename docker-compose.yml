services:
  postgres:
    image: postgres:16
    container_name: vault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vault
      POSTGRES_PASSWORD: vault
      POSTGRES_DB: vault
    ports:
      - '5432:5432'
    volumes:
      - vault-pgdata:/var/lib/postgresql/data

volumes:
  vault-pgdata:
